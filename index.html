<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>母亲节快乐｜妈妈我爱你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce8e0 0%, #ffd9c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'KaiTi', cursive;
            padding: 16px;
        }
        .card {
            max-width: 600px;
            background: rgba(255,248,240,0.95);
            border-radius: 60px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2), 0 0 0 10px #fff9ef, 0 0 0 15px #f5bc9e;
            text-align: center;
            padding: 30px 25px 40px;
            animation: glow 3s infinite alternate;
        }
        @keyframes glow {
            0% { box-shadow: 0 30px 50px rgba(0,0,0,0.2), 0 0 0 10px #fff9ef, 0 0 0 15px #f5bc9e; }
            100% { box-shadow: 0 40px 60px rgba(0,0,0,0.3), 0 0 0 10px #fff5e6, 0 0 0 15px #ffaa7a; }
        }
        .flower { font-size: 70px; animation: float 3s infinite; display: inline-block; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 { color: #c75c3c; font-size: 2.5rem; margin: 15px 0; font-family: 'Dancing Script', cursive; }
        .msg { background: #fff0e6; border-radius: 50px; padding: 20px; margin: 20px 0; color: #5a3e2e; font-size: 1.2rem; line-height: 1.6; }
        .heart { font-size: 30px; animation: heartbeat 1.2s infinite; display: inline-block; }
        @keyframes heartbeat {
            0%,100% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 8px #ff4d6d; }
        }
        .btn {
            background: #ffaa7f;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            color: #442211;
            cursor: pointer;
            margin: 8px;
            box-shadow: 0 4px 0 #b2572e;
            transition: 0.05s linear;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b2572e; }
        .signature { margin-top: 20px; font-style: italic; color: #b95f3e; border-top: 2px dashed #ffc7a8; padding-top: 15px; }
        .footer { font-size: 0.7rem; margin-top: 15px; color: #bb7256; }
    </style>
</head>
<body>
<div class="card">
    <div class="flower">🌸💐🌼</div>
    <h1>✨ 亲爱的妈妈 ✨</h1>
    <div class="msg">
        <p>💖 你陪我长大，我伴你到老 💖</p >
        <p>🌹 您的微笑，是我今生最大的眷恋 🌹</p >
        <p>🙏 谢谢您，给了我全世界最温暖的怀抱 🙏</p >
        <div class="heart">❤️</div>
    </div>
    <button class="btn" id="wishBtn">💌 献上康乃馨祝福 💌</button>
    <div class="signature">—— 永远爱您的孩子</div>
    <div class="footer">🌸 愿时光善待我最美的妈妈 🌸</div>
</div>
<script>
    document.getElementById('wishBtn').addEventListener('click', function() {
        alert('🌺 妈妈，母亲节快乐！🌺\n\n愿您永远健康、美丽、幸福！');
        for(let i=0;i<30;i++){
            let petal = document.createElement('div');
            petal.innerHTML = '🌸';
            petal.style.position = 'fixed';
            petal.style.left = Math.random() * window.innerWidth + 'px';
            petal.style.top = '-30px';
            petal.style.fontSize = (15 + Math.random() * 20) + 'px';
            petal.style.opacity = 0.7 + Math.random() * 0.3;
            petal.style.pointerEvents = 'none';
            petal.style.zIndex = '9999';
            petal.style.transition = 'all 3s linear';
            document.body.appendChild(petal);
            setTimeout(() => {
                petal.style.transform = 'translateY(' + (window.innerHeight + 50) + 'px) rotate(' + (Math.random() * 360) + 'deg)';
            }, 10);
            setTimeout(() => { petal.remove(); }, 3000);
        }
    });
</script>
</body>
</html>
